<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Blog — AllSquared</title>
<meta name="description" content="Insights on contracts, escrow, and payment from AllSquared."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#000000;--paper:#FFF8EC;--paper-2:#FFE9B0;--white:#FFFFFF;
  --lime:#C9F546;--lime-deep:#A6D72F;--tomato:#FF5B2E;
  --shadow:6px 6px 0 var(--ink);--shadow-sm:4px 4px 0 var(--ink);
  --border:3px solid var(--ink);--border-thick:4px solid var(--ink);
  --display:'Archivo Black',Impact,sans-serif;
  --sans:'Space Grotesk',-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:17px;line-height:1.55;font-weight:500;-webkit-font-smoothing:antialiased;overflow-x:hidden;background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.12) 1px,transparent 0);background-size:24px 24px}
.wrap{max-width:1280px;margin:0 auto;padding:0 32px}
::selection{background:var(--lime);color:var(--ink)}
a{color:inherit;text-decoration:none}

nav.top{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:var(--border-thick)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:24px}
.as-mark{display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink);font-family:var(--display);font-size:18px;letter-spacing:-.01em}
.as-mark .glyph{width:40px;height:40px;flex-shrink:0;background:var(--lime);border:3px solid var(--ink);display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700}
.nav-links{display:flex;align-items:center;gap:20px;font-size:14px;font-weight:600}
.nav-links a{border:var(--border);padding:8px 16px;background:var(--white);transition:box-shadow .15s,transform .15s}
.nav-links a:hover{box-shadow:var(--shadow-sm);transform:translate(-2px,-2px)}
.nav-links a.active{background:var(--lime)}

.hero{padding:64px 0 48px;border-bottom:var(--border-thick)}
.hero-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--lime);display:inline-block;padding:4px 10px;margin-bottom:16px}
.hero h1{font-family:var(--display);font-size:clamp(40px,6vw,72px);line-height:.95;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:16px}
.hero p{font-size:18px;font-weight:400;max-width:480px;opacity:.7}

.posts-grid{padding:48px 0 80px;display:grid;gap:0}
.post-card{border-bottom:var(--border);padding:32px 0;display:grid;grid-template-columns:1fr auto;align-items:start;gap:24px;transition:background .15s}
.post-card:first-child{border-top:var(--border)}
.post-card:hover{background:var(--lime)}
.post-card:hover{padding-left:16px;padding-right:16px;margin:0 -16px}
.post-date{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;opacity:.55;margin-bottom:10px}
.post-title{font-family:var(--display);font-size:clamp(22px,3vw,32px);text-transform:uppercase;line-height:1;letter-spacing:-.01em;margin-bottom:10px}
.post-excerpt{font-size:15px;font-weight:400;opacity:.7;max-width:560px;line-height:1.5}
.post-arrow{font-size:24px;font-weight:700;opacity:.3;transition:opacity .15s,transform .15s;margin-top:8px}
.post-card:hover .post-arrow{opacity:1;transform:translateX(4px)}
.post-card a.card-link{display:contents;text-decoration:none;color:inherit}

.empty{padding:80px 0;text-align:center;opacity:.45}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-family:var(--display);font-size:28px;text-transform:uppercase}

.loading{padding:80px 0;text-align:center}
.spinner{width:40px;height:40px;border:4px solid var(--ink);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{border-top:var(--border-thick);padding:24px 0;font-family:var(--mono);font-size:11px;opacity:.5;text-align:center}
</style>
</head>
<body>
<nav class="top">
  <div class="wrap">
    <div class="nav-inner">
      <a class="as-mark" href="/">
        <div class="glyph">A²</div>
        ALLSQUARED
      </a>
      <div class="nav-links">
        <a href="/blog/" class="active">Blog</a>
        <a href="/#waitlist">Get early access</a>
      </div>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="hero">
    <div class="hero-label">Insights</div>
    <h1>The Blog</h1>
    <p>Contracts, escrow, and getting paid on time. No fluff.</p>
  </div>

  <div id="posts" class="posts-grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading posts…</p>
    </div>
  </div>
</div>

<footer><div class="wrap">© AllSquared Ltd · <a href="/">allsquared.io</a></div></footer>

<script>
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

async function loadPosts() {
  const container = document.getElementById('posts');
  try {
    const res = await fetch('/api/posts');
    if (!res.ok) throw new Error('Failed to load');
    const posts = await res.json();

    if (!posts.length) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">No posts yet.</div></div>`;
      return;
    }

    container.innerHTML = posts.map(p => `
      <div class="post-card">
        <a class="card-link" href="/blog/${p.slug}">
          <div>
            <div class="post-date">${formatDate(p.published_at)}</div>
            <div class="post-title">${p.title}</div>
            ${p.excerpt ? `<div class="post-excerpt">${p.excerpt}</div>` : ''}
          </div>
          <div class="post-arrow">→</div>
        </a>
      </div>
    `).join('');
  } catch {
    container.innerHTML = `<div class="empty"><div class="empty-icon">!</div><div class="empty-text">Couldn't load posts.</div></div>`;
  }
}

loadPosts();
</script>
</body>
</html>
